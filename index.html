<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TaleX — One ecosystem. Three ways to grow.</title>
<style>
  :root{
    --vc:#FF0033;
    --rf:#05E3F7;
    --tx:#0C1214;
    --tx-green:#6EEF00;
    --ease:cubic-bezier(.6,.02,.1,1);
    --spring:cubic-bezier(.34,1.56,.64,1);
    --icon-cx: 321;
    --icon-cy: 526;
    --icon-sz: 156;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    background:#000;color:#0c1214;overflow:hidden;
  }
  .stage{
    position:fixed;inset:0;display:flex;width:100vw;
    height:100vh;height:100dvh;
  }
  .col{
    position:relative;flex:1 1 0;min-width:0;height:100%;
    overflow:hidden;cursor:pointer;
  }
  .frame{
    position:absolute;left:50%;bottom:0;
    width:640px;height:1080px;
    transform:translateX(-50%);
    transform-origin:bottom center;
  }
  .photo{
    position:absolute;inset:0;width:100%;height:100%;
    background-size:cover;background-position:center bottom;background-repeat:no-repeat;
    z-index:1;
  }
  .col--vc .photo{background-image:url('assets/viewscall.png');background-color:#fbeaee}
  .col--rf .photo{background-image:url('assets/roamfi.png');background-color:#eafbff}
  .col--tx .photo{background-image:url('assets/talex.png');background-color:#f0f0f2}
  .placeholder{
    position:absolute;inset:0;z-index:2;background:#0c1214;
    opacity:0;transition:opacity 360ms ease;pointer-events:none;
  }
  .col.active .placeholder{opacity:1}
  .vid{
    position:absolute;inset:0;width:100%;height:100%;z-index:3;
    object-fit:cover;object-position:center;
    opacity:0;visibility:hidden;transition:opacity 480ms ease;pointer-events:none;
    background:#0c1214;
  }
  .col.playing .vid{opacity:1;visibility:visible}
  .dim{
    position:absolute;inset:0;z-index:4;pointer-events:none;
    background:rgba(8,12,16,0);
    transition:background 380ms ease;
  }
  .stage.has-active .col:not(.active) .dim{background:rgba(8,12,16,.64)}
  .appicon{
    position:absolute;z-index:5;pointer-events:none;
    left:calc(var(--icon-cx) * 1px);
    top:calc(var(--icon-cy) * 1px);
    width:calc(var(--icon-sz) * 1px);
    height:calc(var(--icon-sz) * 1px);
    transform:translate(-50%,-50%);
    background-repeat:no-repeat;background-position:center;background-size:contain;
    opacity:0;transition:opacity 320ms ease;
    filter:drop-shadow(0 10px 22px rgba(0,0,0,.28));
  }
  .col--vc .appicon{background-image:url('assets/icon_viewscall.svg')}
  .col--rf .appicon{background-image:url('assets/icon_roamfi.svg')}
  .col--tx .appicon{background-image:url('assets/icon_talex.svg')}
  .stage.has-active .col:not(.active) .appicon{opacity:1}
  .col + .col::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:1px;z-index:6;
    background:linear-gradient(to bottom,rgba(0,0,0,0),rgba(0,0,0,.08),rgba(0,0,0,0));
  }
  .brand{
    position:fixed;top:26px;left:50%;transform:translateX(-50%);z-index:30;
  }
  .brand a{
    display:block;line-height:0;text-decoration:none;
    transition:transform 220ms var(--spring);transform-origin:center center;
  }
  .brand a:hover{transform:scale(1.08)}
  .brand a:active{transform:scale(.94)}
  .brand .logo{
    height:36px;width:auto;display:block;
    filter:drop-shadow(0 2px 10px rgba(0,0,0,.18));
    transition:opacity 300ms ease;
  }
  .brand .logo--white{position:absolute;top:0;left:0;opacity:0}
  .stage.has-active ~ .brand .logo--dark{opacity:0}
  .stage.has-active ~ .brand .logo--white{opacity:1}
  @media (max-width:820px){
    body{overflow-y:auto;overflow-x:hidden}
    .stage{position:relative;flex-direction:column;height:auto;min-height:100dvh}
    .col{height:34vh;min-height:240px}
    .col + .col::before{width:100%;height:1px;left:0;top:0;right:0;bottom:auto;
      background:linear-gradient(to right,rgba(0,0,0,0),rgba(0,0,0,.08),rgba(0,0,0,0))}
    .stage.has-active .col:not(.active) .dim{background:rgba(8,12,16,.55)}
    .brand .logo{height:28px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition-duration:1ms!important;animation-duration:1ms!important}
  }
</style>
</head>
<body>

  <div class="stage" id="stage">

    <section class="col col--vc" data-video="assets/viewscall.mp4">
      <div class="frame">
        <div class="photo"></div>
        <div class="appicon"></div>
      </div>
      <div class="placeholder"></div>
      <video class="vid" muted loop playsinline preload="auto"></video>
      <div class="dim"></div>
    </section>

    <section class="col col--rf" data-video="assets/roamfi.mp4">
      <div class="frame">
        <div class="photo"></div>
        <div class="appicon"></div>
      </div>
      <div class="placeholder"></div>
      <video class="vid" muted loop playsinline preload="auto"></video>
      <div class="dim"></div>
    </section>

    <section class="col col--tx" data-video="assets/talex.mp4">
      <div class="frame">
        <div class="photo"></div>
        <div class="appicon"></div>
      </div>
      <div class="placeholder"></div>
      <video class="vid" muted loop playsinline preload="auto"></video>
      <div class="dim"></div>
    </section>

  </div>

  <div class="brand">
    <a href="https://docs.talex.world" target="_blank" rel="noopener" id="brandLink">
      <img class="logo logo--dark" src="assets/logo.png" alt="TaleX">
      <img class="logo logo--white" src="assets/logo_white.png" alt="">
    </a>
  </div>

<script>
  const stage = document.getElementById('stage');
  const cols = Array.from(document.querySelectorAll('.col'));
  const brandLink = document.getElementById('brandLink');
  const isMobile = () => window.matchMedia('(max-width:820px)').matches;

  function fitFrames(){
    cols.forEach(col=>{
      const frame = col.querySelector('.frame');
      const cw = col.clientWidth, ch = col.clientHeight;
      const scale = Math.max(cw/640, ch/1080);
      frame.style.transform = `translateX(-50%) scale(${scale})`;
    });
  }
  window.addEventListener('resize', fitFrames);

  cols.forEach(col=>{
    const v = col.querySelector('.vid');
    if(col.dataset.video){ v.src = col.dataset.video; }
  });

  let activeCol = null, settleTimer = null, brandHovered = false;

  function activate(col){
    if(activeCol === col) return;
    deactivate();
    activeCol = col;
    stage.classList.add('has-active');
    col.classList.add('active');
    clearTimeout(settleTimer);
    settleTimer = setTimeout(()=>{
      if(activeCol !== col) return;
      const v = col.querySelector('.vid');
      if(v && v.getAttribute('src')){
        v.currentTime = 0;
        const p = v.play(); if(p && p.catch) p.catch(()=>{});
        col.classList.add('playing');
      }
    }, 360);
  }

  function deactivate(){
    clearTimeout(settleTimer);
    stage.classList.remove('has-active');
    cols.forEach(c=>{
      c.classList.remove('active'); c.classList.remove('playing');
      const v = c.querySelector('.vid'); if(v){ try{ v.pause(); }catch(e){} }
    });
    activeCol = null;
  }

  cols.forEach(col=>{
    col.addEventListener('mouseenter', ()=>{
      if(isMobile() || brandHovered) return;
      activate(col);
    });
  });
  stage.addEventListener('mouseleave', ()=>{ if(!isMobile()) deactivate(); });

  brandLink.addEventListener('mouseenter', ()=>{ brandHovered = true; if(!isMobile()) deactivate(); });
  brandLink.addEventListener('mouseleave', ()=>{ brandHovered = false; });

  cols.forEach(col=>{
    col.addEventListener('click', ()=>{
      if(!isMobile()) return;
      const on = col.classList.contains('active');
      deactivate(); if(!on) activate(col);
    });
  });

  document.addEventListener('visibilitychange', ()=>{ if(document.hidden) deactivate(); });

  fitFrames();
</script>
</body>
</html>
